name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ☕ Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: ⚡ Install Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: zig-x86_64-linux-0.16.0
          key: zig-0.16.0

      - name: ⚡ Download Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          wget -q "https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz"
          tar -xf "zig-x86_64-linux-0.16.0.tar.xz"

      - name: ⚡ Add Zig to PATH
        run: echo "$PWD/zig-x86_64-linux-0.16.0" >> $GITHUB_PATH

      - name: 🔧 Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"


      - name: 🔢 Compute versions
        id: versions
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE=${CURRENT%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          RELEASE="$MAJOR.$MINOR.$PATCH"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Releasing $RELEASE, next snapshot will be $NEXT"

      - name: 🏷️ Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: 📝 Set release version
        run: mvn -B versions:set -DnewVersion=${{ steps.versions.outputs.release }} -DgenerateBackupPoms=false

      - name: 💾 Commit release version
        run: |
          git add pom.xml
          git commit -m "release ${{ steps.versions.outputs.release }}"

      - name: 📦 Build and deploy to GitHub Packages
        run: mvn -B deploy -Prelease -DaltDeploymentRepository=github::https://maven.pkg.github.com/Jbbouille/sqlite-ffm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Set next snapshot version
        run: mvn -B versions:set -DnewVersion=${{ steps.versions.outputs.next }} -DgenerateBackupPoms=false

      - name: 💾 Commit next snapshot version
        run: |
          git add pom.xml
          git commit -m "prepare next development iteration ${{ steps.versions.outputs.next }}"

      - name: 🔄 Rebase on remote before push
        run: git rebase origin/master

      - name: 🏷️ Tag release
        run: git tag v${{ steps.versions.outputs.release }} HEAD~1

      - name: 📤 Push commits and tag
        run: git push origin master --tags

      - name: 🎉 Create GitHub Release
        run: |
          TAG="v${{ steps.versions.outputs.release }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %h %s (%an)" "$TAG" | grep -v "^- [a-f0-9]* release " | grep -v "^- [a-f0-9]* prepare next development")
          else
            NOTES=$(git log --pretty=format:"- %h %s (%an)" "${PREV_TAG}..${TAG}" | grep -v "^- [a-f0-9]* release " | grep -v "^- [a-f0-9]* prepare next development")
          fi
          gh release create "$TAG" --title "$TAG" --notes "$NOTES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
